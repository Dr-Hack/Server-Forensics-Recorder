# server-forensics default configuration
#
# This file is intentionally simple shell syntax. Keep values unquoted unless a
# path contains spaces. Installed systems may override these defaults in:
#   /etc/server-forensics/config.conf

# Normal collection cadence. The systemd timer also uses a 60 second cadence.
INTERVAL=60

# Watcher thresholds. Panic mode starts when any threshold is crossed.
LOAD_THRESHOLD=10
LSPHP_THRESHOLD=40
MEMORY_THRESHOLD_MB=500
ESTABLISHED_THRESHOLD=300
DSTATE_THRESHOLD=5

# Minimum seconds after an incident closes before another one may be created.
PANIC_COOLDOWN=300

# Number of incident directories to keep. Older incidents are compressed into
# archive/ and removed from incidents/.
KEEP_INCIDENTS=100

# Runtime paths.
LOG_DIR=/var/log/server-forensics

# Optional behavior flags.
DEBUG=0
VERBOSE=1
QUIET=0

# Lightweight collector timeout for optional commands.
COLLECTOR_COMMAND_TIMEOUT=1

# Optional MySQL/MariaDB client credentials file. Leave empty to rely on the
# client's normal lookup (root's ~/.my.cnf, socket auth, etc). Set an absolute
# path when credentials live elsewhere, e.g. a dedicated monitoring account:
#   MYSQL_DEFAULTS_FILE=/etc/server-forensics/mysql.cnf
# It is passed to mysqladmin as --defaults-extra-file for status collection.
MYSQL_DEFAULTS_FILE=

# Panic snapshot behavior. These are not normally tuned, but are exposed so busy
# production servers can reduce the diagnostic footprint if needed.
PANIC_SNAPSHOT_INTERVAL=10
PANIC_COMMAND_TIMEOUT=20
PANIC_OUTPUT_LINES=5000

# D-state / blocking forensics. Most incidents on this server were driven by
# uninterruptible (D-state) processes, so each panic snapshot also records which
# processes were blocked, on what kernel wait channel, and what maintenance was
# running. All of it is cheap /proc reads; package managers are DETECTED from the
# process table, never invoked. On incident close an analysis.txt is generated
# that names the most likely subsystem with a confidence level.
ENABLE_DSTATE_FORENSICS=1
# Read /proc/<pid>/stack and wchan for blocked processes (needs root; some
# hardened kernels restrict it). Set 0 to skip kernel stacks entirely.
PANIC_CAPTURE_KERNEL_STACK=1
# Cap on how many D-state PIDs get a kernel-stack read per snapshot, so a storm
# of blocked tasks can never make the recorder itself fan out.
PANIC_DSTATE_MAX_PIDS=25

# Optional lightweight metric plugins.
ENABLE_PLUGINS=1
PLUGIN_TIMEOUT=1
PLUGIN_DIRS=/opt/server-forensics/plugins/metrics:/etc/server-forensics/plugins/metrics
